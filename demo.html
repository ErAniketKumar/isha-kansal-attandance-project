<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance Sheet Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #f0ede8;
        min-height: 100vh;
        color: #1a1a1a;
      }

      header {
        background: #1a1a1a;
        color: #fff;
        padding: 1.25rem 2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      header .logo-mark {
        width: 36px;
        height: 36px;
        background: #e8c547;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 18px;
        color: #1a1a1a;
      }

      header h1 {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      header p {
        font-size: 12px;
        color: #888;
        margin-top: 1px;
      }

      .container {
        max-width: 820px;
        margin: 2rem auto;
        padding: 0 1.5rem 4rem;
      }

      .card {
        background: #fff;
        border-radius: 14px;
        border: 1px solid #e0ddd8;
        padding: 1.5rem;
        margin-bottom: 1rem;
      }

      .card-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #888;
        margin-bottom: 1rem;
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .grid-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 12px;
      }

      label.field-label {
        font-size: 12px;
        color: #666;
        display: block;
        margin-bottom: 5px;
        font-weight: 500;
      }

      input[type="text"],
      input[type="date"],
      input[type="number"],
      select {
        width: 100%;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 9px 12px;
        font-size: 13px;
        font-family: inherit;
        color: #1a1a1a;
        background: #fafafa;
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus,
      select:focus {
        border-color: #e8c547;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(232, 197, 71, 0.15);
      }

      .drop-zone {
        border: 2px dashed #d0cdc8;
        border-radius: 10px;
        padding: 2.5rem 1.5rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.15s;
        background: #fafaf8;
      }

      .drop-zone:hover,
      .drop-zone.active {
        border-color: #e8c547;
        background: #fffdf0;
      }

      .drop-zone .icon {
        font-size: 32px;
        margin-bottom: 0.5rem;
        display: block;
      }

      .drop-zone h3 {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #333;
      }

      .drop-zone p {
        font-size: 12px;
        color: #999;
      }

      .file-badge {
        display: none;
        margin-top: 0.75rem;
        padding: 0.6rem 1rem;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 8px;
        font-size: 13px;
        color: #166534;
        align-items: center;
        gap: 8px;
      }

      .file-badge .dot {
        width: 8px;
        height: 8px;
        background: #22c55e;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .col-mapper {
        display: none;
        margin-top: 0.75rem;
      }

      .logo-upload-area {
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 0.75rem 1rem;
        background: #fafafa;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .logo-preview {
        width: 60px;
        height: 30px;
        object-fit: contain;
        display: none;
        border: 1px solid #eee;
        border-radius: 4px;
        padding: 2px;
        background: #fff;
      }

      .btn-generate {
        width: 100%;
        padding: 1rem;
        background: #1a1a1a;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s;
        letter-spacing: 0.02em;
      }

      .btn-generate:hover {
        background: #333;
      }
      .btn-generate:active {
        transform: scale(0.99);
      }
      .btn-generate:disabled {
        background: #aaa;
        cursor: not-allowed;
        transform: none;
      }

      .status-bar {
        margin-top: 0.75rem;
        font-size: 13px;
        color: #666;
        text-align: center;
        min-height: 20px;
      }

      .status-bar.error {
        color: #dc2626;
      }
      .status-bar.success {
        color: #16a34a;
      }

      .preview-card {
        display: none;
        margin-top: 1rem;
        background: #fff;
        border-radius: 14px;
        border: 1px solid #e0ddd8;
        overflow: hidden;
      }

      .preview-header {
        padding: 0.875rem 1.25rem;
        background: #f7f6f3;
        border-bottom: 1px solid #e8e5e0;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .preview-header span {
        font-size: 13px;
        font-weight: 600;
        color: #333;
      }

      .download-btn {
        padding: 0.4rem 1rem;
        background: #e8c547;
        color: #1a1a1a;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        font-family: inherit;
        transition: background 0.15s;
        display: inline-block;
      }

      .download-btn:hover {
        background: #d4b030;
      }

      iframe {
        width: 100%;
        height: 550px;
        border: none;
        display: block;
      }

      .tip {
        font-size: 11.5px;
        color: #aaa;
        margin-top: 5px;
      }

      @media (max-width: 600px) {
        .grid-2,
        .grid-3 {
          grid-template-columns: 1fr;
        }
        header {
          padding: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-mark">A</div>
      <div>
        <h1>Attendance Sheet Generator</h1>
        <p>Upload Excel &rarr; Fill details &rarr; Download PDF</p>
      </div>
    </header>

    <div class="container">
      <!-- Event Details -->
      <div class="card">
        <div class="card-label">Event Details</div>
        <div class="grid-2" style="margin-bottom: 12px">
          <div>
            <label class="field-label">Event Title</label>
            <input
              type="text"
              id="eventTitle"
              placeholder="e.g. Pre-Placement Talk & Interviews"
              value="Pre-Placement Talk &amp; Interviews"
            />
          </div>
          <div>
            <label class="field-label">Company / Organisation</label>
            <input
              type="text"
              id="company"
              placeholder="e.g. Capgemini"
              value="Capgemini"
            />
          </div>
        </div>
        <div class="grid-3">
          <div>
            <label class="field-label">Date</label>
            <input type="date" id="eventDate" />
          </div>
          <div>
            <label class="field-label">Venue</label>
            <input
              type="text"
              id="venue"
              placeholder="e.g. Sun Hall, Chitkara University"
              value="Sun Hall, Chitkara University"
            />
          </div>
          <div>
            <label class="field-label">Rows per page</label>
            <input type="number" id="rowsPerPage" value="25" min="5" max="50" />
            <p class="tip">Recommended: 20–30</p>
          </div>
        </div>
      </div>

      <!-- Upload -->
      <div class="card">
        <div class="card-label">Attendee List (Excel)</div>
        <div class="drop-zone" id="dropZone">
          <span class="icon">📂</span>
          <h3>Drop your Excel file here</h3>
          <p>.xlsx or .xls — must have Name and Roll No columns</p>
          <input
            type="file"
            id="fileInput"
            accept=".xlsx,.xls,.csv"
            style="display: none"
          />
        </div>

        <div class="file-badge" id="fileBadge">
          <span class="dot"></span>
          <span id="fileName"></span>
          <span style="color: #666; margin-left: 4px" id="rowCount"></span>
        </div>

        <div class="col-mapper" id="colMapper">
          <div class="grid-2" style="margin-top: 0.75rem">
            <div>
              <label class="field-label">Name column</label>
              <select id="nameCol"></select>
            </div>
            <div>
              <label class="field-label">Roll No column</label>
              <select id="rollCol"></select>
            </div>
          </div>
        </div>
      </div>

      <!-- Logos -->
      <div class="card">
        <div class="card-label">Logos (Optional)</div>
        <div class="grid-2">
          <div class="logo-upload-area">
            <label class="field-label" style="margin: 0"
              >Left logo (University)</label
            >
            <input
              type="file"
              id="logo1"
              accept="image/*"
              style="font-size: 12px"
            />
            <img id="logo1Preview" class="logo-preview" alt="Logo 1 preview" />
          </div>
          <div class="logo-upload-area">
            <label class="field-label" style="margin: 0"
              >Right logo (Company)</label
            >
            <input
              type="file"
              id="logo2"
              accept="image/*"
              style="font-size: 12px"
            />
            <img id="logo2Preview" class="logo-preview" alt="Logo 2 preview" />
          </div>
        </div>
      </div>

      <!-- Generate -->
      <div class="card">
        <button class="btn-generate" id="generateBtn" onclick="generatePDF()">
          Generate Attendance Sheet PDF
        </button>
        <div class="status-bar" id="status"></div>
      </div>

      <!-- Preview -->
      <div class="preview-card" id="previewCard">
        <div class="preview-header">
          <span id="previewLabel">Preview</span>
          <a id="downloadLink" href="#" class="download-btn">⬇ Download PDF</a>
        </div>
        <iframe id="pdfFrame"></iframe>
      </div>
    </div>

    <script>
      let attendees = [];
      let logo1Data = null,
        logo2Data = null;

      // Set today's date as default
      document.getElementById("eventDate").valueAsDate = new Date();

      // Drop zone
      const dropZone = document.getElementById("dropZone");
      const fileInput = document.getElementById("fileInput");

      dropZone.addEventListener("click", () => fileInput.click());
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("active");
      });
      dropZone.addEventListener("dragleave", () =>
        dropZone.classList.remove("active"),
      );
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("active");
        handleFile(e.dataTransfer.files[0]);
      });
      fileInput.addEventListener("change", (e) =>
        handleFile(e.target.files[0]),
      );

      // Logo previews
      document
        .getElementById("logo1")
        .addEventListener("change", (e) =>
          readLogo(e.target.files[0], "logo1"),
        );
      document
        .getElementById("logo2")
        .addEventListener("change", (e) =>
          readLogo(e.target.files[0], "logo2"),
        );

      function readLogo(file, which) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          if (which === "logo1") {
            logo1Data = e.target.result;
            const img = document.getElementById("logo1Preview");
            img.src = logo1Data;
            img.style.display = "block";
          } else {
            logo2Data = e.target.result;
            const img = document.getElementById("logo2Preview");
            img.src = logo2Data;
            img.style.display = "block";
          }
        };
        reader.readAsDataURL(file);
      }

      function handleFile(file) {
        if (!file) return;
        setStatus("Reading file…", "");
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const wb = XLSX.read(e.target.result, { type: "array" });
            const ws = wb.Sheets[wb.SheetNames[0]];
            const data = XLSX.utils.sheet_to_json(ws, { header: 1 });
            const headers = data[0].map((h) => String(h || "").trim());
            attendees = data
              .slice(1)
              .filter((r) => r.some((c) => c !== undefined && c !== ""));

            document.getElementById("fileBadge").style.display = "flex";
            document.getElementById("fileName").textContent = file.name;
            document.getElementById("rowCount").textContent =
              `• ${attendees.length} students`;

            const nameCol = document.getElementById("nameCol");
            const rollCol = document.getElementById("rollCol");
            nameCol.innerHTML = "";
            rollCol.innerHTML = "";

            headers.forEach((h, i) => {
              const o1 = new Option(h, i);
              const o2 = new Option(h, i);
              if (/name/i.test(h)) o1.selected = true;
              if (/roll/i.test(h)) o2.selected = true;
              nameCol.add(o1);
              rollCol.add(o2);
            });

            document.getElementById("colMapper").style.display = "block";
            setStatus(
              `${attendees.length} attendees loaded successfully.`,
              "success",
            );
          } catch (err) {
            setStatus(
              "Could not read file. Please use a valid .xlsx or .xls file.",
              "error",
            );
          }
        };
        reader.readAsArrayBuffer(file);
      }

      function setStatus(msg, type) {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = "status-bar" + (type ? " " + type : "");
      }

      function formatDate(dateVal) {
        const d = dateVal ? new Date(dateVal + "T00:00:00") : new Date();
        const day = d.getDate();
        const suffix =
          [, "st", "nd", "rd"][
            (day % 100) - 11 < 3 && day % 100 > 10 ? 0 : day % 10
          ] || "th";
        const months = [
          "January",
          "February",
          "March",
          "April",
          "May",
          "June",
          "July",
          "August",
          "September",
          "October",
          "November",
          "December",
        ];
        return {
          day,
          suffix,
          month: months[d.getMonth()],
          year: d.getFullYear(),
        };
      }

      // Draw date with superscript suffix using Times font
      function drawDateText(doc, dateObj, x, y, fontSize) {
        const dayStr = String(dateObj.day);
        const monthYear = ` ${dateObj.month} ${dateObj.year}`;
        doc.setFont("times", "normal");
        doc.setFontSize(fontSize);
        // draw day number
        doc.text(dayStr, x, y);
        const dayW = doc.getTextWidth(dayStr);
        // draw superscript suffix
        doc.setFontSize(fontSize * 0.65);
        doc.text(dateObj.suffix, x + dayW, y - fontSize * 0.18);
        // draw month year
        doc.setFontSize(fontSize);
        const supW = doc.getTextWidth(dateObj.suffix) * 0.65;
        doc.text(monthYear, x + dayW + supW + 0.3, y);
        // return total width
        return dayW + supW + doc.getTextWidth(monthYear) + 0.3;
      }

      async function generatePDF() {
        const title =
          document.getElementById("eventTitle").value.trim() ||
          "Attendance Sheet";
        const company = document.getElementById("company").value.trim();
        const dateVal = document.getElementById("eventDate").value;
        const venue = document.getElementById("venue").value.trim();
        const rowsPerPage = Math.max(
          5,
          Math.min(
            50,
            parseInt(document.getElementById("rowsPerPage").value) || 25,
          ),
        );

        if (!attendees.length) {
          setStatus(
            "Please upload an Excel file with attendee data first.",
            "error",
          );
          return;
        }

        const nameIdx = parseInt(document.getElementById("nameCol").value);
        const rollIdx = parseInt(document.getElementById("rollCol").value);
        const dateObj = formatDate(dateVal);
        const formattedDatePlain = `${dateObj.day}${dateObj.suffix} ${dateObj.month} ${dateObj.year}`;

        document.getElementById("generateBtn").disabled = true;
        setStatus("Generating PDF…", "");

        try {
          await new Promise((r) => setTimeout(r, 50));

          const { jsPDF } = window.jspdf;
          const doc = new jsPDF({
            orientation: "portrait",
            unit: "mm",
            format: "a4",
          });

          const pageW = 210,
            pageH = 297;
          const pageMargin = 14;
          const tableW = 120;
          const tl = (pageW - tableW) / 2;

          const pages = [];
          for (let i = 0; i < attendees.length; i += rowsPerPage)
            pages.push(attendees.slice(i, i + rowsPerPage));

          for (let p = 0; p < pages.length; p++) {
            if (p > 0) doc.addPage();
            const rows = pages[p];
            const startNum = p * rowsPerPage + 1;

            let y = 12;
            const logoH = 16,
              logoW = 42;
            const logo1H = logoH + 8;

            // Left logo
            if (logo1Data) {
              try {
                doc.addImage(
                  logo1Data,
                  undefined,
                  pageMargin,
                  y,
                  logoW,
                  logo1H,
                  undefined,
                  "FAST",
                );
              } catch (e) {
                drawTextLogo(doc, "UNIVERSITY", pageMargin, y);
              }
            } else {
              drawTextLogo(doc, "UNIVERSITY", pageMargin, y);
            }

            // Center title — Times New Roman bold, bigger
            doc.setFont("times", "bold");
            doc.setFontSize(15);
            doc.setTextColor(20, 20, 20);
            doc.text(title, pageW / 2, y + 12, { align: "center" });

            // Right logo
            if (logo2Data) {
              try {
                doc.addImage(
                  logo2Data,
                  undefined,
                  pageW - pageMargin - logoW,
                  y,
                  logoW,
                  logoH,
                  undefined,
                  "FAST",
                );
              } catch (e) {
                if (company)
                  drawTextLogo(
                    doc,
                    company.toUpperCase(),
                    pageW - pageMargin - logoW,
                    y,
                  );
              }
            } else if (company) {
              drawTextLogo(
                doc,
                company.toUpperCase(),
                pageW - pageMargin - logoW,
                y,
              );
            }

            y += logoH + 6;

            // Divider line
            doc.setDrawColor(200, 195, 190);
            doc.setLineWidth(0.4);
            doc.line(pageMargin, y, pageW - pageMargin, y);
            y += 6;

            // Date with superscript — Times, 10pt
            doc.setTextColor(60, 60, 60);
            doc.text("Date: ", pageMargin, y);
            doc.setFont("times", "normal");
            const labelW =
              (doc.getStringUnitWidth("Date: ") * 10) /
              doc.internal.scaleFactor;
            drawDateText(
              doc,
              dateObj,
              pageMargin + doc.getTextWidth("Date: "),
              y,
              10,
            );

            // Venue — right aligned, Times
            if (venue) {
              doc.setFont("times", "normal");
              doc.setFontSize(10);
              doc.setTextColor(60, 60, 60);
              doc.text(`Venue: ${venue}`, pageW - pageMargin, y, {
                align: "right",
              });
            }
            y += 9;

            // Table header — bluish-green, Times bold, bigger
            const colW = [12, 44, 34, 30];
            const hdrs = ["S.No.", "Name", "Roll No", "Signature"];
            const rowH = 10;

            doc.setFillColor(0, 128, 128); // teal / bluish-green
            doc.rect(tl, y, tableW, rowH, "F");
            doc.setDrawColor(0, 100, 100);
            doc.setLineWidth(0.4);
            doc.rect(tl, y, tableW, rowH, "S");

            doc.setFont("times", "bold");
            doc.setFontSize(10);
            doc.setTextColor(255, 255, 255);

            let cx = tl;
            hdrs.forEach((h, i) => {
              doc.text(h, cx + 2, y + 7);
              if (i < hdrs.length - 1) {
                doc.setDrawColor(255, 255, 255);
                doc.line(cx + colW[i], y, cx + colW[i], y + rowH);
              }
              cx += colW[i];
            });
            y += rowH;

            // Table rows — Times, 10pt
            rows.forEach((row, idx) => {
              const sno = String(startNum + idx);
              const name = String(
                row[nameIdx] !== undefined ? row[nameIdx] : "",
              ).trim();
              const roll = String(
                row[rollIdx] !== undefined ? row[rollIdx] : "",
              ).trim();

              doc.setDrawColor(160, 160, 160);
              doc.setLineWidth(0.2);
              doc.rect(tl, y, tableW, rowH, "S");

              let dx = tl;
              colW.slice(0, -1).forEach((w) => {
                dx += w;
                doc.setDrawColor(160, 160, 160);
                doc.line(dx, y, dx, y + rowH);
              });

              doc.setFont("times", "normal");
              doc.setFontSize(10);
              doc.setTextColor(0, 0, 0);

              let cx2 = tl;
              [sno, name, roll, ""].forEach((val, i) => {
                if (val) doc.text(val, cx2 + 2.5, y + 7);
                cx2 += colW[i];
              });

              y += rowH;
            });

            // Footer
            doc.setFontSize(8);
            doc.setFont("times", "normal");
            doc.setTextColor(160, 155, 150);
            doc.text(`Page ${p + 1} of ${pages.length}`, pageW / 2, pageH - 9, {
              align: "center",
            });
            if (company) doc.text(company, pageMargin, pageH - 9);
            doc.text(formattedDatePlain, pageW - pageMargin, pageH - 9, {
              align: "right",
            });
          }

          const blob = doc.output("blob");
          const url = URL.createObjectURL(blob);
          const safeName = (company || "event").replace(/\s+/g, "_");
          const safeDateStr = dateVal || new Date().toISOString().slice(0, 10);

          document.getElementById("pdfFrame").src = url;
          const dl = document.getElementById("downloadLink");
          dl.href = url;
          dl.download = `${safeName}_Attendance_${safeDateStr}.pdf`;
          document.getElementById("previewLabel").textContent =
            `Preview — ${pages.length} page(s), ${attendees.length} students`;
          document.getElementById("previewCard").style.display = "block";
          document
            .getElementById("previewCard")
            .scrollIntoView({ behavior: "smooth", block: "start" });

          setStatus(
            `Done! ${pages.length} page(s) generated for ${attendees.length} students.`,
            "success",
          );
        } catch (err) {
          setStatus("Error generating PDF: " + err.message, "error");
          console.error(err);
        }

        document.getElementById("generateBtn").disabled = false;
      }

      function drawTextLogo(doc, text, x, y) {
        doc.setFont("times", "bold");
        doc.setFontSize(10);
        doc.setTextColor(30, 30, 30);
        doc.text(text, x, y + 8);
      }
    </script>
  </body>
</html>
